site_name: Disease Research Notebook
site_description: Consolidated disease sources and research notes
theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Diseases:
      - Example Disease: diseases/example-disease.md

# This makes sure search engines don't index the site
extra:
  generator: false
